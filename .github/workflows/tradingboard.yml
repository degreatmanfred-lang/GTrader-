name: Trading Bot

on:
  schedule:
    - cron: '*/15 * * * *'   # Runs every 15 minutes
  workflow_dispatch:        # Manual trigger enabled

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout Repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Check if Weekday (Skip Saturday & Sunday)
      - name: Check if weekday
        id: weekday_check
        run: |
          DAY=$(date +%u)
          if [ "$DAY" -ge 6 ]; then
            echo "Weekend detected. Skipping bot run."
            echo "run_bot=false" >> $GITHUB_OUTPUT
          else
            echo "Weekday detected. Running bot."
            echo "run_bot=true" >> $GITHUB_OUTPUT
          fi

      # 3️⃣ Setup Python
      - name: Set up Python
        if: steps.weekday_check.outputs.run_bot == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4️⃣ Install Dependencies
      - name: Install dependencies
        if: steps.weekday_check.outputs.run_bot == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5️⃣ Recreate Firebase Service Account File
      - name: Create Firebase credentials file
        if: steps.weekday_check.outputs.run_bot == 'true'
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > firebase-service-account.json

      # 6️⃣ Run Trading Bot
      - name: Run Trading Bot
        if: steps.weekday_check.outputs.run_bot == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          TWELVEDATA_API_KEY_1: ${{ secrets.TWELVEDATA_API_KEY_1 }}
          TWELVEDATA_API_KEY_2: ${{ secrets.TWELVEDATA_API_KEY_2 }}
          TWELVEDATA_API_KEY_3: ${{ secrets.TWELVEDATA_API_KEY_3 }}

        run: |
          python main.py
